<!DOCTYPE html>
<html class="dark" lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0E2044"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Tabellone – ARETUSA LEAGUE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "outline": "#889487", "on-surface": "#dfe3e7",
          "surface-container-lowest": "#071530", "surface-container-low": "#152040",
          "on-primary": "#003918", "surface-container": "#1e3368",
          "secondary": "#71ff74", "tertiary-container": "#f36238",
          "background": "#0E2044", "surface-container-highest": "#2d5aa0",
          "primary-container": "#3fa35f", "surface-bright": "#353a3d",
          "surface": "#0E2044", "on-surface-variant": "#becabc",
          "primary": "#77db90", "surface-container-high": "#254E8F",
          "outline-variant": "#3f4a3f", "on-secondary": "#003909"
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "label": ["Inter"] }
      }
    }
  }
</script>
<style>
  body { background-color: #0E2044; color: #dfe3e7; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100dvh; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .bracket-ghost-line { border-color: rgba(119,219,144,0.08); }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0E2044]/80 backdrop-blur-xl shadow-2xl shadow-[#000000]/40">
  <div class="flex items-center justify-between px-6 h-16 w-full">
    <div class="flex items-center">
      <img src="logo-white.png" alt="Aretusa League" class="h-9 w-auto object-contain"/>
    </div>
    <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
  </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center relative px-6 py-20">

  <!-- Background image -->
  <img src="court-sunset.png" alt="Campo da padel" class="absolute inset-0 w-full h-full object-cover opacity-30"/>
  <div class="absolute inset-0 bg-gradient-to-t from-[#071530] via-[#0E2044]/70 to-[#0E2044]/40"></div>

  <!-- Ghost Bracket Background -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20 overflow-hidden">
    <div class="w-full h-full max-w-5xl grid grid-cols-3 gap-8 p-12">
      <div class="flex flex-col justify-around">
        <div class="h-16 w-full border-2 bracket-ghost-line rounded-xl relative"><div class="absolute -right-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div></div>
        <div class="h-16 w-full border-2 bracket-ghost-line rounded-xl relative"><div class="absolute -right-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div></div>
        <div class="h-16 w-full border-2 bracket-ghost-line rounded-xl relative"><div class="absolute -right-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div></div>
        <div class="h-16 w-full border-2 bracket-ghost-line rounded-xl relative"><div class="absolute -right-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div></div>
      </div>
      <div class="flex flex-col justify-around py-20">
        <div class="h-20 w-full border-2 bracket-ghost-line rounded-xl relative"><div class="absolute -left-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div><div class="absolute -right-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div></div>
        <div class="h-20 w-full border-2 bracket-ghost-line rounded-xl relative"><div class="absolute -left-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div><div class="absolute -right-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div></div>
      </div>
      <div class="flex flex-col justify-center">
        <div class="h-24 w-full border-4 bracket-ghost-line rounded-2xl border-dashed relative"><div class="absolute -left-8 top-1/2 w-8 h-[2px] bg-[rgba(119,219,144,0.08)]"></div><div class="absolute inset-0 flex items-center justify-center"><span class="material-symbols-outlined text-4xl text-[rgba(119,219,144,0.1)]">emoji_events</span></div></div>
      </div>
    </div>
  </div>

  <!-- Center Content -->
  <div class="relative z-10 flex flex-col items-center text-center max-w-lg">
    <div class="mb-10 p-8 rounded-full bg-[#0E2044]/40 backdrop-blur-md shadow-inner border border-white/5">
      <span class="material-symbols-outlined text-8xl text-[#77db90]" style="font-variation-settings:'FILL' 1;">emoji_events</span>
    </div>
    <h2 class="font-headline text-3xl md:text-5xl font-black text-[#dfe3e7] mb-6 tracking-tight leading-none">
      TABELLONE <span class="text-[#77db90]">FINALE</span>
    </h2>
    <div class="h-1 w-24 bg-gradient-to-r from-transparent via-[#77db90] to-transparent mb-8"></div>
    <p class="font-body text-on-surface/70 text-lg leading-relaxed px-4">
      Il tabellone sarà disponibile al termine della fase a gironi
    </p>
    <div class="mt-12 flex flex-col sm:flex-row gap-4 items-center">
      <button onclick="this.innerHTML='<span class=\'material-symbols-outlined text-sm\' style=\'font-variation-settings:&quot;FILL&quot; 1;\'>check_circle</span> Iscritto!'; this.classList.add('opacity-60'); this.disabled=true;" class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-3 rounded-lg font-bold uppercase tracking-widest text-xs flex items-center gap-2 shadow-lg shadow-primary/20 hover:scale-105 transition-transform active:scale-95">
        <span class="material-symbols-outlined text-sm">notifications</span>
        Avvisami quando pronto
      </button>
      <a href="gironi.html" class="text-on-surface-variant hover:text-primary transition-colors text-xs font-bold uppercase tracking-widest flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">groups</span>
        Vedi Gironi
      </a>
    </div>
  </div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 rounded-t-2xl bg-[#0E2044]/90 backdrop-blur-2xl shadow-[0_-8px_30px_rgb(0,0,0,0.5)]">
  <div class="flex justify-around items-center pt-3 pb-6 px-4">
    <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60 hover:text-[#77db90] transition-all" href="index.html">
      <span class="material-symbols-outlined text-2xl mb-1">home</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60 hover:text-[#77db90] transition-all" href="gironi.html">
      <span class="material-symbols-outlined text-2xl mb-1">groups</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Gironi</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60 hover:text-[#77db90] transition-all" href="calendario.html">
      <span class="material-symbols-outlined text-2xl mb-1">calendar_today</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Calendario</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#71ff74] scale-110" href="tabellone.html">
      <span class="material-symbols-outlined text-2xl mb-1" style="font-variation-settings:'FILL' 1;">account_tree</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Tabellone</span>
    </a>
  </div>
</nav>

</body>
</html>

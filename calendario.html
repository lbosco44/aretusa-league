<!DOCTYPE html>
<html class="dark" lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0E2044"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Calendario – ARETUSA LEAGUE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{ colors:{
      "on-surface":"#dfe3e7","surface-container-lowest":"#071530","surface-container-low":"#152040",
      "on-primary":"#003918","surface-container":"#1e3368","secondary":"#71ff74",
      "background":"#0E2044","surface-container-highest":"#2d5aa0","primary-container":"#3fa35f",
      "surface":"#0E2044","on-surface-variant":"#becabc","primary":"#77db90",
      "surface-container-high":"#254E8F","outline-variant":"#3f4a3f","on-secondary":"#003909"
    }, borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
    fontFamily:{"headline":["Space Grotesk"],"body":["Inter"],"label":["Inter"]}}}
  }
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  body{min-height:100dvh;background-color:#0E2044;font-family:'Inter',sans-serif;}
</style>
</head>
<body class="font-body text-on-surface antialiased mb-24">

<header class="fixed top-0 w-full z-50 bg-[#0E2044]/80 backdrop-blur-xl shadow-2xl shadow-[#000000]/40">
  <div class="flex items-center justify-between px-6 h-16 w-full">
    <img src="logo-white.png" alt="Aretusa League" class="h-9 w-auto object-contain"/>
    <button onclick="openModal()" class="flex items-center gap-2 bg-gradient-to-r from-[#27F24C] to-[#1DB954] text-[#003909] font-headline font-bold px-4 py-2 rounded-xl text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">
      <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">add_circle</span>
      Aggiungi Partita
    </button>
  </div>
</header>

<main class="pt-24 px-4 max-w-4xl mx-auto space-y-8" id="calendar-main">
  <div class="flex items-end justify-between">
    <div>
      <span class="text-secondary font-headline uppercase tracking-[0.2em] text-xs font-bold">Padel League</span>
      <h2 class="text-4xl font-headline font-black text-on-surface uppercase" style="letter-spacing:-0.04em">Calendario</h2>
    </div>
  </div>
  <div id="matches-container"></div>
</main>

<!-- ADD MATCH MODAL -->
<div id="modal-overlay" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm hidden flex items-end md:items-center justify-center p-4">
  <div class="w-full max-w-lg bg-[#1e3368] rounded-3xl rounded-b-none md:rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
    <div class="flex items-center justify-between p-6 border-b border-white/10 bg-[#254E8F]/40">
      <div class="flex items-center gap-3">
        <div class="w-2 h-8 bg-secondary rounded-full"></div>
        <h3 class="font-headline text-xl font-black uppercase">Nuova Partita</h3>
      </div>
      <button onclick="closeModal()" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all">
        <span class="material-symbols-outlined text-on-surface">close</span>
      </button>
    </div>
    <div class="p-6 space-y-5 overflow-y-auto max-h-[70vh]">
      <!-- Girone -->
      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">grid_view</span>Girone</label>
        <div class="relative">
          <select id="sel-girone" onchange="onGironeChange()" class="w-full h-12 px-4 bg-[#071530] border border-white/10 rounded-xl text-on-surface font-semibold appearance-none focus:outline-none focus:border-secondary transition-all">
            <option value="">— Seleziona girone —</option>
            <option value="A">Girone A</option>
            <option value="B">Girone B</option>
            <option value="C">Girone C</option>
            <option value="D">Girone D</option>
          </select>
          <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined pointer-events-none text-on-surface-variant">expand_more</span>
        </div>
      </div>
      <!-- Squadra Casa -->
      <div class="space-y-2" id="block-casa">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">home</span>Squadra Casa</label>
        <div class="relative">
          <select id="sel-casa" onchange="onCasaChange()" disabled class="w-full h-12 px-4 bg-[#071530] border border-white/10 rounded-xl text-on-surface font-semibold appearance-none focus:outline-none focus:border-secondary transition-all disabled:opacity-40">
            <option value="">— Prima scegli il girone —</option>
          </select>
          <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined pointer-events-none text-on-surface-variant">expand_more</span>
        </div>
        <p id="campo-auto" class="text-[10px] text-secondary font-bold pl-1 hidden"><span class="material-symbols-outlined text-[12px] align-middle">location_on</span> Campo: <span id="campo-name"></span></p>
      </div>
      <!-- Squadra Ospite -->
      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">sports_tennis</span>Squadra Ospite</label>
        <div class="relative">
          <select id="sel-ospite" disabled class="w-full h-12 px-4 bg-[#071530] border border-white/10 rounded-xl text-on-surface font-semibold appearance-none focus:outline-none focus:border-secondary transition-all disabled:opacity-40">
            <option value="">— Prima scegli la casa —</option>
          </select>
          <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined pointer-events-none text-on-surface-variant">expand_more</span>
        </div>
      </div>
      <!-- Data & Ora -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">calendar_today</span>Data</label>
          <input id="inp-data" type="date" class="w-full h-12 px-4 bg-[#071530] border border-white/10 rounded-xl text-on-surface font-semibold focus:outline-none focus:border-secondary transition-all"/>
        </div>
        <div class="space-y-2">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span>Orario</label>
          <input id="inp-ora" type="time" class="w-full h-12 px-4 bg-[#071530] border border-white/10 rounded-xl text-on-surface font-semibold focus:outline-none focus:border-secondary transition-all"/>
        </div>
      </div>
    </div>
    <div class="p-6 pt-0">
      <button onclick="addMatch()" class="w-full h-14 bg-gradient-to-r from-[#27F24C] to-[#1DB954] text-[#003909] font-headline font-black uppercase tracking-widest text-sm rounded-xl shadow-xl active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">check_circle</span>
        Aggiungi al Calendario
      </button>
    </div>
  </div>
</div>

<!-- RESULT MODAL -->
<div id="result-overlay" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm hidden flex items-end md:items-center justify-center p-4">
  <div class="w-full max-w-lg bg-[#1e3368] rounded-3xl rounded-b-none md:rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
    <div class="flex items-center justify-between p-6 border-b border-white/10 bg-[#254E8F]/40">
      <div class="flex items-center gap-3">
        <div class="w-2 h-8 bg-[#f36238] rounded-full"></div>
        <div>
          <h3 class="font-headline text-xl font-black uppercase">Inserisci Risultato</h3>
          <p id="result-match-label" class="text-xs text-on-surface-variant font-medium mt-0.5"></p>
        </div>
      </div>
      <button onclick="closeResultModal()" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all">
        <span class="material-symbols-outlined text-on-surface">close</span>
      </button>
    </div>
    <div class="p-6 space-y-5">
      <!-- Set 1 -->
      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Set 1</label>
        <div class="flex items-center gap-3">
          <div class="flex-1 space-y-1"><p id="rlabel-casa" class="text-[10px] text-on-surface-variant text-center truncate"></p><input id="r-s1a" type="number" min="0" max="7" placeholder="0" class="w-full h-14 text-3xl font-black text-center bg-[#071530] border border-white/10 rounded-xl focus:outline-none focus:border-[#71ff74] transition-all"/></div>
          <span class="text-on-surface-variant font-black">–</span>
          <div class="flex-1 space-y-1"><p id="rlabel-ospite" class="text-[10px] text-on-surface-variant text-center truncate"></p><input id="r-s1b" type="number" min="0" max="7" placeholder="0" class="w-full h-14 text-3xl font-black text-center bg-[#071530] border border-white/10 rounded-xl focus:outline-none focus:border-[#71ff74] transition-all"/></div>
        </div>
      </div>
      <!-- Set 2 -->
      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Set 2</label>
        <div class="flex items-center gap-3">
          <input id="r-s2a" type="number" min="0" max="7" placeholder="0" class="flex-1 h-14 text-3xl font-black text-center bg-[#071530] border border-white/10 rounded-xl focus:outline-none focus:border-[#71ff74] transition-all"/>
          <span class="text-on-surface-variant font-black">–</span>
          <input id="r-s2b" type="number" min="0" max="7" placeholder="0" class="flex-1 h-14 text-3xl font-black text-center bg-[#071530] border border-white/10 rounded-xl focus:outline-none focus:border-[#71ff74] transition-all"/>
        </div>
      </div>
      <!-- Set 3 tiebreak -->
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-[#f36238] inline-block"></span>
            Tiebreak
          </label>
          <div class="flex bg-[#071530] border border-white/10 p-1 rounded-xl gap-1">
            <button id="rbtn-7" onclick="setTbTarget(7)" class="px-4 py-1.5 rounded-lg text-xs font-black uppercase bg-[#f36238] text-white transition-all">a 7</button>
            <button id="rbtn-10" onclick="setTbTarget(10)" class="px-4 py-1.5 rounded-lg text-xs font-black uppercase text-on-surface-variant transition-all">a 10</button>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex-1 min-w-0">
            <input id="r-s3a" type="number" min="0" placeholder="0" class="w-full h-14 text-3xl font-black text-center bg-[#071530] border border-white/10 rounded-xl focus:outline-none focus:border-[#f36238] transition-all"/>
          </div>
          <span class="text-on-surface-variant font-black shrink-0">–</span>
          <div class="flex-1 min-w-0">
            <input id="r-s3b" type="number" min="0" placeholder="0" class="w-full h-14 text-3xl font-black text-center bg-[#071530] border border-white/10 rounded-xl focus:outline-none focus:border-[#f36238] transition-all"/>
          </div>
        </div>
      </div>
    </div>
    <div class="p-6 pt-0">
      <button onclick="confirmResult()" class="w-full h-14 bg-gradient-to-r from-[#f36238] to-[#d44e28] text-white font-headline font-black uppercase tracking-widest text-sm rounded-xl shadow-xl active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">check_circle</span>
        Conferma Risultato
      </button>
    </div>
  </div>
</div>

<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#0E2044]/90 backdrop-blur-2xl shadow-[0_-8px_30px_rgb(0,0,0,0.5)]">
  <div class="flex justify-around items-center pt-3 pb-6 px-4">
    <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60 hover:text-[#77db90] transition-all" href="index.html">
      <span class="material-symbols-outlined mb-1">home</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60 hover:text-[#77db90] transition-all" href="gironi.html">
      <span class="material-symbols-outlined mb-1">groups</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Gironi</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#71ff74] scale-110" href="calendario.html">
      <span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1;">calendar_today</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Calendario</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60 hover:text-[#77db90] transition-all" href="tabellone.html">
      <span class="material-symbols-outlined mb-1">account_tree</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-semibold">Tabellone</span>
    </a>
  </div>
</nav>

<script>
const teams = {
  A:[
    {name:"Calvo / Bosco",    abbr:"CB",club:"TC Aretusa"},
    {name:"Rossi / Bianchi",  abbr:"RB",club:"Padel Club Siracusa"},
    {name:"Ferrari / Martini",abbr:"FM",club:"ASD Ortigia Padel"},
    {name:"Gallo / Esposito", abbr:"GE",club:"TC Belvedere"}
  ],
  B:[
    {name:"Moretti / De Luca",abbr:"MD",club:"Padel Club Siracusa"},
    {name:"Colombo / Farina", abbr:"CF",club:"TC Aretusa"},
    {name:"Bruno / Greco",    abbr:"BG",club:"ASD Ortigia Padel"},
    {name:"Vitale / Serra",   abbr:"VS",club:"TC Belvedere"}
  ],
  C:[
    {name:"Russo / Conti",       abbr:"RC",club:"TC Aretusa"},
    {name:"Mancini / Ricci",     abbr:"MR",club:"Padel Club Siracusa"},
    {name:"Lombardi / De Santis",abbr:"LD",club:"TC Belvedere"},
    {name:"Pellegrino / Caruso", abbr:"PC",club:"ASD Ortigia Padel"}
  ],
  D:[
    {name:"Messina / Grasso",    abbr:"MG",club:"ASD Ortigia Padel"},
    {name:"Randazzo / Amato",    abbr:"RA",club:"TC Aretusa"},
    {name:"Barbera / Lo Presti", abbr:"BL",club:"Padel Club Siracusa"},
    {name:"Fontana / Martino",   abbr:"FM",club:"TC Belvedere"}
  ]
};

let matches = [
  {date:"2025-05-17",ora:"18:30",girone:"A",casa:{name:"Calvo / Bosco",abbr:"CB",club:"TC Aretusa"},ospite:{name:"Rossi / Bianchi",abbr:"RB",club:"Padel Club Siracusa"},score:"2-1",sets:["6-4","3-6","10-8"],played:true},
  {date:"2025-05-17",ora:"20:00",girone:"A",casa:{name:"Ferrari / Martini",abbr:"FM",club:"ASD Ortigia Padel"},ospite:{name:"Gallo / Esposito",abbr:"GE",club:"TC Belvedere"},score:"3-0",sets:["6-3","6-2","7-4"],played:true},
  {date:"2025-05-19",ora:"19:00",girone:"B",casa:{name:"Moretti / De Luca",abbr:"MD",club:"Padel Club Siracusa"},ospite:{name:"Vitale / Serra",abbr:"VS",club:"TC Belvedere"},score:"3-0",sets:["6-2","6-4","7-3"],played:true},
  {date:"2025-05-19",ora:"21:00",girone:"A",casa:{name:"Calvo / Bosco",abbr:"CB",club:"TC Aretusa"},ospite:{name:"Ferrari / Martini",abbr:"FM",club:"ASD Ortigia Padel"},score:"3-0",sets:["6-1","6-3","7-2"],played:true},
  {date:"2025-05-20",ora:"20:00",girone:"A",casa:{name:"Ferrari / Martini",abbr:"FM",club:"ASD Ortigia Padel"},ospite:{name:"Gallo / Esposito",abbr:"GE",club:"TC Belvedere"},played:false},
  {date:"2025-05-20",ora:"21:30",girone:"B",casa:{name:"Colombo / Farina",abbr:"CF",club:"TC Aretusa"},ospite:{name:"Bruno / Greco",abbr:"BG",club:"ASD Ortigia Padel"},played:false},
  {date:"2025-05-22",ora:"19:30",girone:"C",casa:{name:"Russo / Conti",abbr:"RC",club:"TC Aretusa"},ospite:{name:"Lombardi / De Santis",abbr:"LD",club:"TC Belvedere"},played:false},
  {date:"2025-05-22",ora:"21:00",girone:"C",casa:{name:"Mancini / Ricci",abbr:"MR",club:"Padel Club Siracusa"},ospite:{name:"Pellegrino / Caruso",abbr:"PC",club:"ASD Ortigia Padel"},played:false}
];

function fmtDate(d){
  const [y,m,day]=d.split('-');
  const giorni=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
  const mesi=["GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"];
  const dt=new Date(+y,+m-1,+day);
  return `${giorni[dt.getDay()]} ${day} ${mesi[+m-1]}`;
}

function matchCard(m, idx){
  if(m.played){
    const tbLabel = m.tbTarget ? `TB/${m.tbTarget}` : 'TB';
    const setsHtml=m.sets.map((s,i)=>`<div class="flex gap-2 items-center bg-[#2d5aa0]/50 px-4 py-2 rounded-lg"><span class="text-[#77db90] text-xs font-bold uppercase">${i<2?'Set '+(i+1):tbLabel}</span><span class="text-on-surface font-bold text-sm">${s}</span></div>`).join('');
    return `<div class="bg-[#152040] rounded-xl overflow-hidden shadow-lg border-l-4 border-[#71ff74]"><div class="p-4 sm:p-6"><div class="flex justify-between items-start mb-4"><div class="flex items-center gap-2 text-on-surface-variant text-xs uppercase tracking-widest font-bold"><span class="material-symbols-outlined text-sm">location_on</span><span>${m.casa.club} • ${m.ora}</span><span class="ml-1 text-[10px] text-on-surface-variant/50">Girone ${m.girone}</span></div><span class="bg-[#27F24C] text-[#003909] px-3 py-1 rounded-full text-[10px] font-black uppercase">Giocata</span></div><div class="grid grid-cols-7 gap-4 items-center"><div class="col-span-3 flex items-center justify-end gap-3"><div class="text-right"><h4 class="font-headline font-bold text-base uppercase">${m.casa.name}</h4><p class="text-on-surface-variant text-[10px]">${m.casa.club}</p></div><div class="w-10 h-10 rounded-full bg-[#2d5aa0] flex items-center justify-center border-2 border-[#71ff74]/30"><span class="font-headline font-bold text-[#71ff74] text-xs">${m.casa.abbr}</span></div></div><div class="col-span-1 flex flex-col items-center bg-[#1e3368] rounded-lg py-2"><span class="font-headline font-black text-xl text-[#71ff74]">${m.score}</span></div><div class="col-span-3 flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-[#2d5aa0] flex items-center justify-center border-2 border-white/10"><span class="font-headline font-bold text-on-surface-variant text-xs">${m.ospite.abbr}</span></div><div><h4 class="font-headline font-bold text-base uppercase">${m.ospite.name}</h4><p class="text-on-surface-variant text-[10px]">${m.ospite.club}</p></div></div></div><div class="mt-4 pt-4 border-t border-white/5 flex flex-wrap justify-center gap-3">${setsHtml}</div></div></div>`;
  } else {
    return `<div class="bg-[#152040] rounded-xl overflow-hidden shadow-lg border-l-4 border-[#3f4a3f]"><div class="p-4 sm:p-6"><div class="flex justify-between items-start mb-4"><div class="flex items-center gap-2 text-on-surface-variant text-xs uppercase tracking-widest font-bold"><span class="material-symbols-outlined text-sm">location_on</span><span>${m.casa.club} • ${m.ora}</span><span class="ml-1 text-[10px] text-on-surface-variant/50">Girone ${m.girone}</span></div><span class="bg-[#D3D0CB] text-[#152040] px-3 py-1 rounded-full text-[10px] font-black uppercase">Prossima</span></div><div class="grid grid-cols-7 gap-4 items-center"><div class="col-span-3 flex items-center justify-end gap-3"><div class="text-right"><h4 class="font-headline font-bold text-base uppercase">${m.casa.name}</h4><p class="text-on-surface-variant text-[10px]">${m.casa.club}</p></div><div class="w-10 h-10 rounded-full bg-[#2d5aa0] flex items-center justify-center"><span class="font-headline font-bold text-on-surface-variant/70 text-xs">${m.casa.abbr}</span></div></div><div class="col-span-1 flex flex-col items-center justify-center"><span class="font-headline font-black text-xl text-[#3f4a3f] italic">VS</span></div><div class="col-span-3 flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-[#2d5aa0] flex items-center justify-center"><span class="font-headline font-bold text-on-surface-variant/70 text-xs">${m.ospite.abbr}</span></div><div><h4 class="font-headline font-bold text-base uppercase">${m.ospite.name}</h4><p class="text-on-surface-variant text-[10px]">${m.ospite.club}</p></div></div></div><div class="mt-4 pt-3 border-t border-white/5"><button onclick="openResultModal(${idx})" class="w-full py-2.5 bg-[#f36238]/10 hover:bg-[#f36238]/20 border border-[#f36238]/30 text-[#f36238] font-headline font-bold text-xs uppercase tracking-widest rounded-xl transition-all flex items-center justify-center gap-2 active:scale-[0.98]"><span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">edit_note</span>Inserisci Risultato</button></div></div></div>`;
  }
}

function renderCalendar(){
  const grouped={};
  matches.forEach((m,i)=>{ if(!grouped[m.date]) grouped[m.date]=[]; grouped[m.date].push({m,i}); });
  const sorted=Object.keys(grouped).sort();
  let html='';
  sorted.forEach(date=>{
    html+=`<section class="space-y-4 pb-4"><div class="flex items-center gap-4"><h3 class="font-headline font-bold text-xl text-on-surface whitespace-nowrap">${fmtDate(date)}</h3><div class="h-[1px] flex-grow bg-[#3f4a3f]/30"></div></div>${grouped[date].map(({m,i})=>matchCard(m,i)).join('')}</section>`;
  });
  document.getElementById('matches-container').innerHTML=html||'<p class="text-on-surface-variant text-center py-12">Nessuna partita in calendario.</p>';
}

// Modal logic
function openModal(){ document.getElementById('modal-overlay').classList.remove('hidden'); }
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); resetModal(); }
function resetModal(){
  document.getElementById('sel-girone').value='';
  document.getElementById('sel-casa').innerHTML='<option value="">— Prima scegli il girone —</option>';
  document.getElementById('sel-casa').disabled=true;
  document.getElementById('sel-ospite').innerHTML='<option value="">— Prima scegli la casa —</option>';
  document.getElementById('sel-ospite').disabled=true;
  document.getElementById('campo-auto').classList.add('hidden');
  document.getElementById('inp-data').value='';
  document.getElementById('inp-ora').value='';
}
function onGironeChange(){
  const g=document.getElementById('sel-girone').value;
  const sc=document.getElementById('sel-casa');
  const so=document.getElementById('sel-ospite');
  document.getElementById('campo-auto').classList.add('hidden');
  so.innerHTML='<option value="">— Prima scegli la casa —</option>'; so.disabled=true;
  if(!g){ sc.innerHTML='<option value="">— Prima scegli il girone —</option>'; sc.disabled=true; return; }
  sc.innerHTML='<option value="">— Seleziona —</option>'+teams[g].map((t,i)=>`<option value="${i}">${t.name} (${t.club})</option>`).join('');
  sc.disabled=false;
}
function onCasaChange(){
  const g=document.getElementById('sel-girone').value;
  const ci=document.getElementById('sel-casa').value;
  const so=document.getElementById('sel-ospite');
  const campoEl=document.getElementById('campo-auto');
  const campoName=document.getElementById('campo-name');
  if(!ci){ so.innerHTML='<option value="">— Prima scegli la casa —</option>'; so.disabled=true; campoEl.classList.add('hidden'); return; }
  const casa=teams[g][+ci];
  campoName.textContent=casa.club; campoEl.classList.remove('hidden');
  so.innerHTML='<option value="">— Seleziona —</option>'+teams[g].filter((_,i)=>i!==+ci).map((t,i)=>{
    const origIdx=teams[g].indexOf(t);
    return `<option value="${origIdx}">${t.name} (${t.club})</option>`;
  }).join('');
  so.disabled=false;
}
function addMatch(){
  const g=document.getElementById('sel-girone').value;
  const ci=document.getElementById('sel-casa').value;
  const oi=document.getElementById('sel-ospite').value;
  const data=document.getElementById('inp-data').value;
  const ora=document.getElementById('inp-ora').value;
  if(!g||ci===''||oi===''||!data||!ora){ alert('Compila tutti i campi'); return; }
  matches.push({ date:data, ora:ora, girone:g, casa:teams[g][+ci], ospite:teams[g][+oi], played:false });
  matches.sort((a,b)=>a.date===b.date?a.ora.localeCompare(b.ora):a.date.localeCompare(b.date));
  renderCalendar();
  closeModal();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.getElementById('result-overlay').addEventListener('click',function(e){ if(e.target===this) closeResultModal(); });

// Result modal
let currentResultIdx = -1;
let tbTarget = 7;

function setTbTarget(n){
  tbTarget = n;
  const b7 = document.getElementById('rbtn-7');
  const b10 = document.getElementById('rbtn-10');
  b7.className  = `px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${n===7  ? 'bg-[#f36238] text-white' : 'text-on-surface-variant'}`;
  b10.className = `px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${n===10 ? 'bg-[#f36238] text-white' : 'text-on-surface-variant'}`;
}

function openResultModal(idx){
  currentResultIdx = idx;
  const m = matches[idx];
  document.getElementById('result-match-label').textContent = `${m.casa.name} vs ${m.ospite.name} • Girone ${m.girone} • ${m.ora}`;
  document.getElementById('rlabel-casa').textContent = m.casa.name;
  document.getElementById('rlabel-ospite').textContent = m.ospite.name;
  ['r-s1a','r-s1b','r-s2a','r-s2b','r-s3a','r-s3b'].forEach(id=>{ document.getElementById(id).value=''; });
  setTbTarget(7);
  document.getElementById('result-overlay').classList.remove('hidden');
}

function closeResultModal(){
  document.getElementById('result-overlay').classList.add('hidden');
  currentResultIdx = -1;
}


function confirmResult(){
  const v = id => parseInt(document.getElementById(id).value);
  const s1a=v('r-s1a'), s1b=v('r-s1b'), s2a=v('r-s2a'), s2b=v('r-s2b'), s3a=v('r-s3a'), s3b=v('r-s3b');
  if([s1a,s1b,s2a,s2b,s3a,s3b].some(isNaN)){ alert('Inserisci tutti e 3 i punteggi dei set'); return; }
  if(s1a===s1b||s2a===s2b||s3a===s3b){ alert('Nessun set può finire in parità'); return; }

  let casaW=0, ospiteW=0;
  if(s1a>s1b) casaW++; else ospiteW++;
  if(s2a>s2b) casaW++; else ospiteW++;
  if(s3a>s3b) casaW++; else ospiteW++;

  matches[currentResultIdx].score = `${casaW}-${ospiteW}`;
  matches[currentResultIdx].sets = [`${s1a}-${s1b}`, `${s2a}-${s2b}`, `${s3a}-${s3b}`];
  matches[currentResultIdx].tbTarget = tbTarget;
  matches[currentResultIdx].played = true;
  renderCalendar();
  closeResultModal();
}

renderCalendar();
</script>
</body>
</html>

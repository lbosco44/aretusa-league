<!DOCTYPE html>
<html class="dark" lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0E2044"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Inserisci Risultato – ARETUSA LEAGUE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "outline": "#889487", "on-surface": "#dfe3e7",
          "surface-container-lowest": "#071530", "surface-container-low": "#152040",
          "on-primary": "#003918", "surface-container": "#1e3368",
          "secondary": "#71ff74", "tertiary-container": "#f36238",
          "background": "#0E2044", "surface-container-highest": "#2d5aa0",
          "primary-container": "#3fa35f", "surface-bright": "#353a3d",
          "surface": "#0E2044", "on-surface-variant": "#becabc",
          "primary": "#77db90", "surface-container-high": "#254E8F",
          "outline-variant": "#3f4a3f", "on-secondary": "#003909"
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "label": ["Inter"] }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
  h1, h2, h3, .headline { font-family: 'Space Grotesk', sans-serif; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<!-- BACKGROUND OVERLAY -->
<div class="fixed inset-0 bg-[#000000]/70 backdrop-blur-md z-0"></div>

<!-- TOP APP BAR -->
<header class="fixed top-0 w-full z-50 bg-[#0E2044]/80 backdrop-blur-xl shadow-2xl shadow-[#000000]/40 flex items-center justify-between px-6 h-16">
  <div class="flex items-center">
    <img src="logo-white.png" alt="Aretusa League" class="h-9 w-auto object-contain"/>
  </div>
  <a href="calendario.html" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-highest hover:bg-surface-bright transition-all text-on-surface">
    <span class="material-symbols-outlined">close</span>
  </a>
</header>

<!-- MODAL SHEET -->
<main class="relative z-10 flex items-end md:items-center justify-center min-h-screen pt-16 md:p-6">
  <div class="w-full max-w-2xl bg-surface-container shadow-[0_20px_50px_rgba(0,0,0,0.5)] md:rounded-2xl rounded-t-3xl border-t border-x md:border border-outline-variant/20 flex flex-col max-h-[calc(100dvh-4rem)] overflow-hidden">

    <!-- HEADER -->
    <div class="p-6 flex items-center justify-between border-b border-outline-variant/10 bg-surface-container-high/50 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-2 h-8 bg-secondary rounded-full"></div>
        <h2 class="text-2xl font-black tracking-tight headline">INSERISCI RISULTATO</h2>
      </div>
      <a href="calendario.html" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-highest hover:bg-surface-bright transition-all text-on-surface">
        <span class="material-symbols-outlined">close</span>
      </a>
    </div>

    <!-- FORM -->
    <div class="p-6 overflow-y-auto space-y-8 flex-1">

      <!-- MATCH SELECTOR -->
      <div class="space-y-3">
        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
          <span class="material-symbols-outlined text-[16px]">event_available</span>
          Seleziona Partita
        </label>
        <div class="relative">
          <select class="w-full bg-surface-container-lowest border-l-4 border-l-primary border-y-0 border-r-0 h-14 px-4 rounded-r-lg text-on-surface font-semibold appearance-none focus:ring-0 focus:border-l-secondary transition-all">
            <option>GIRONE A: Rossi/Bianchi vs Ferrari/Martini</option>
            <option>GIRONE A: Gallo/Esposito vs Rizzo/Conti</option>
            <option>GIRONE B: Moretti/De Luca vs Colombo/Rizzo</option>
            <option>GIRONE B: Bruno/Greco vs altro</option>
          </select>
          <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined pointer-events-none text-on-surface-variant">expand_more</span>
        </div>
      </div>

      <!-- SCORE INPUTS -->
      <div class="bg-surface-container-low p-6 rounded-2xl space-y-6">
        <!-- TEAM A -->
        <div class="space-y-3">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-secondary/10 border border-secondary/30 flex items-center justify-center font-headline font-bold text-secondary text-sm">RB</div>
            <span class="font-black tracking-tight text-lg">Rossi / Bianchi</span>
          </div>
          <div class="flex gap-4">
            <div class="flex-1 space-y-2">
              <label class="text-[10px] uppercase tracking-tighter text-on-surface-variant font-bold">Set 1</label>
              <input id="a1" class="w-full h-16 text-3xl font-black text-center bg-surface-container-highest border-0 rounded-xl focus:ring-2 focus:ring-secondary/50 transition-all" placeholder="0" type="number" min="0" max="7"/>
            </div>
            <div class="flex-1 space-y-2">
              <label class="text-[10px] uppercase tracking-tighter text-on-surface-variant font-bold">Set 2</label>
              <input id="a2" class="w-full h-16 text-3xl font-black text-center bg-surface-container-highest border-0 rounded-xl focus:ring-2 focus:ring-secondary/50 transition-all" placeholder="0" type="number" min="0" max="7"/>
            </div>
          </div>
        </div>

        <!-- DIVIDER -->
        <div class="flex items-center justify-center">
          <span class="text-outline-variant font-black italic text-2xl opacity-30">VS</span>
        </div>

        <!-- TEAM B -->
        <div class="space-y-3">
          <div class="flex items-center gap-3 justify-end text-right">
            <span class="font-black tracking-tight text-lg">Ferrari / Martini</span>
            <div class="w-10 h-10 rounded-lg bg-surface-container-highest border border-outline-variant flex items-center justify-center font-headline font-bold text-on-surface-variant text-sm">FM</div>
          </div>
          <div class="flex gap-4">
            <div class="flex-1 space-y-2">
              <label class="text-[10px] uppercase tracking-tighter text-on-surface-variant font-bold">Set 1</label>
              <input id="b1" class="w-full h-16 text-3xl font-black text-center bg-surface-container-highest border-0 rounded-xl focus:ring-2 focus:ring-secondary/50 transition-all" placeholder="0" type="number" min="0" max="7"/>
            </div>
            <div class="flex-1 space-y-2">
              <label class="text-[10px] uppercase tracking-tighter text-on-surface-variant font-bold">Set 2</label>
              <input id="b2" class="w-full h-16 text-3xl font-black text-center bg-surface-container-highest border-0 rounded-xl focus:ring-2 focus:ring-secondary/50 transition-all" placeholder="0" type="number" min="0" max="7"/>
            </div>
          </div>
        </div>
      </div>

      <!-- TIEBREAK / TERZO SET -->
      <div class="bg-surface-container-lowest/50 border border-outline-variant/10 rounded-2xl p-6 space-y-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <label class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Set Decisivo</label>
          <div class="flex items-center gap-2 bg-surface-container-high p-1 rounded-xl">
            <button id="btn-st" onclick="setDecisivo('st')" class="px-4 py-2 rounded-lg text-xs font-black uppercase tracking-tighter bg-surface text-secondary transition-all">Super Tiebreak</button>
            <button id="btn-3s" onclick="setDecisivo('3s')" class="px-4 py-2 rounded-lg text-xs font-black uppercase tracking-tighter text-on-surface-variant hover:text-on-surface transition-all">Terzo Set</button>
          </div>
        </div>
        <div class="pt-4 border-t border-outline-variant/5">
          <div class="flex items-center justify-center gap-6">
            <div class="text-center space-y-2">
              <p id="label-a" class="text-[10px] font-bold text-on-surface-variant uppercase">ST Team A</p>
              <input id="st_a" class="w-20 h-20 text-4xl font-black text-center bg-tertiary-container/10 border-2 border-tertiary-container/30 rounded-2xl focus:border-tertiary-container transition-all" placeholder="-" type="number" min="0"/>
            </div>
            <div class="h-px w-8 bg-outline-variant opacity-30 mt-6"></div>
            <div class="text-center space-y-2">
              <p id="label-b" class="text-[10px] font-bold text-on-surface-variant uppercase">ST Team B</p>
              <input id="st_b" class="w-20 h-20 text-4xl font-black text-center bg-tertiary-container/10 border-2 border-tertiary-container/30 rounded-2xl focus:border-tertiary-container transition-all" placeholder="-" type="number" min="0"/>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="p-6 bg-surface-container-high/30 border-t border-outline-variant/10 flex-shrink-0">
      <button onclick="conferma()" class="w-full h-16 bg-gradient-to-r from-[#27F24C] to-[#1DB954] text-on-primary font-black uppercase tracking-widest text-lg rounded-xl shadow-xl shadow-secondary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-3">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">check_circle</span>
        Conferma Risultato
      </button>
    </div>

  </div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#0E2044]/90 backdrop-blur-2xl rounded-t-2xl flex justify-around items-center pt-3 pb-6 px-4 shadow-[0_-8px_30px_rgb(0,0,0,0.5)]">
  <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60" href="index.html">
    <span class="material-symbols-outlined">home</span>
    <span class="font-label text-[10px] uppercase tracking-widest font-semibold mt-1">Home</span>
  </a>
  <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60" href="gironi.html">
    <span class="material-symbols-outlined">groups</span>
    <span class="font-label text-[10px] uppercase tracking-widest font-semibold mt-1">Gironi</span>
  </a>
  <a class="flex flex-col items-center justify-center text-[#dfe3e7]/60" href="calendario.html">
    <span class="material-symbols-outlined">calendar_today</span>
    <span class="font-label text-[10px] uppercase tracking-widest font-semibold mt-1">Calendario</span>
  </a>
  <a class="flex flex-col items-center justify-center text-[#71ff74] scale-110" href="#">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">add_circle</span>
    <span class="font-label text-[10px] uppercase tracking-widest font-semibold mt-1">Risultato</span>
  </a>
</nav>

<script>
  function setDecisivo(mode) {
    const btnST = document.getElementById('btn-st');
    const btn3S = document.getElementById('btn-3s');
    const la = document.getElementById('label-a');
    const lb = document.getElementById('label-b');
    if (mode === 'st') {
      btnST.classList.add('bg-surface','text-secondary');
      btnST.classList.remove('text-on-surface-variant');
      btn3S.classList.remove('bg-surface','text-secondary');
      btn3S.classList.add('text-on-surface-variant');
      la.textContent = 'ST Team A'; lb.textContent = 'ST Team B';
    } else {
      btn3S.classList.add('bg-surface','text-secondary');
      btn3S.classList.remove('text-on-surface-variant');
      btnST.classList.remove('bg-surface','text-secondary');
      btnST.classList.add('text-on-surface-variant');
      la.textContent = 'Set 3 Team A'; lb.textContent = 'Set 3 Team B';
    }
  }

  function conferma() {
    const btn = event.currentTarget;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 1;">task_alt</span> Risultato Salvato!';
    btn.classList.add('opacity-80');
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'calendario.html'; }, 1200);
  }
</script>
</body>
</html>
